name: 🚀 Flutter Web2App Premium Builder

on:
  workflow_dispatch:
    inputs:
      website_url: { description: '🌐 URL Website', required: true, type: string }
      app_name: { description: '📱 Nama Aplikasi', required: true, type: string }
      package_name: { description: '📦 Package Name', required: true, type: string, default: 'com.kevin.app' }
      primary_color: { description: '🎨 Primary Color', required: true, type: string, default: '0xFF667EEA' }
      icon_url: { description: '🖼️ Icon URL', required: false, type: string, default: '' }
      fullscreen_mode: { description: '⛶ Fullscreen', required: true, type: choice, options: [immersive, edge_to_edge, normal], default: edge_to_edge }
      orientation: { description: '📐 Orientasi', required: true, type: choice, options: [auto, portrait, landscape], default: auto }
      loading_style: { description: '✨ Loading', required: true, type: choice, options: [premium, minimal], default: premium }
      enable_pull_refresh: { description: '🔄 Pull Refresh', required: true, type: boolean, default: true }
      enable_localstorage: { description: '💾 LocalStorage', required: true, type: boolean, default: true }
      enable_permissions: { description: '🔐 Permission', required: true, type: boolean, default: true }
      perm_camera: { description: '📷 Camera', required: true, type: boolean, default: true }
      perm_mic: { description: '🎙️ Mic', required: true, type: boolean, default: false }
      perm_location: { description: '📍 Location', required: true, type: boolean, default: true }
      perm_storage: { description: '📂 Storage', required: true, type: boolean, default: true }
      perm_phone: { description: '📞 Phone', required: true, type: boolean, default: false }
      perm_contacts: { description: '👥 Contacts', required: true, type: boolean, default: false }
      perm_bluetooth: { description: '🔵 Bluetooth', required: true, type: boolean, default: false }

permissions: { contents: write }

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      URL: ${{ github.event.inputs.website_url }}
      APP: ${{ github.event.inputs.app_name }}
      PKG: ${{ github.event.inputs.package_name }}
      COLOR: ${{ github.event.inputs.primary_color }}
      ICON: ${{ github.event.inputs.icon_url }}
      FS: ${{ github.event.inputs.fullscreen_mode }}
      ORIENT: ${{ github.event.inputs.orientation }}
      LOAD: ${{ github.event.inputs.loading_style }}
      PULL: ${{ github.event.inputs.enable_pull_refresh }}
      LOCAL: ${{ github.event.inputs.enable_localstorage }}
      PERM: ${{ github.event.inputs.enable_permissions }}
      CAM: ${{ github.event.inputs.perm_camera }}
      MIC: ${{ github.event.inputs.perm_mic }}
      LOC: ${{ github.event.inputs.perm_location }}
      STO: ${{ github.event.inputs.perm_storage }}
      PHO: ${{ github.event.inputs.perm_phone }}
      CON: ${{ github.event.inputs.perm_contacts }}
      BLU: ${{ github.event.inputs.perm_bluetooth }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: '3.24.3', cache: true }

      - name: 🤖 Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools && cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools cmdline-tools-temp
          mkdir -p cmdline-tools && mv cmdline-tools-temp cmdline-tools/latest
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          export PATH="$PATH:$HOME/android-sdk/cmdline-tools/latest/bin"
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 🏗️ Generate Flutter Project
        run: |
          ORG=$(echo "$PKG" | sed 's/\.[^.]*$//')
          PROJ=$(echo "$PKG" | awk -F. '{print $NF}')
          
          flutter create --platforms=android --project-name="$PROJ" --org "$ORG" web2app_temp
          cd web2app_temp

          # ===== PUBSPEC =====
          cat > pubspec.yaml <<EOF
          name: $PROJ
          description: Web2App Premium
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter: { sdk: flutter }
            webview_flutter: ^4.10.0
            connectivity_plus: ^6.0.3
            http: ^1.2.1
            dart:convert
          EOF
          [ "$PERM" = "true" ] && echo "  permission_handler: ^10.4.0" >> pubspec.yaml
          [ "$LOCAL" = "true" ] && echo "  shared_preferences: ^2.2.3" >> pubspec.yaml
          echo "flutter:" >> pubspec.yaml
          echo "  uses-material-design: true" >> pubspec.yaml

          # ===== FIX GRADLE =====
          cat > android/build.gradle <<'GRADLE'
          allprojects {
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.buildDir = '../build'
          subprojects {
            project.buildDir = "${rootProject.buildDir}/${project.name}"
            project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
            delete rootProject.buildDir
          }
          GRADLE

          cat > android/app/build.gradle <<GRADLE
          plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
          }
          android {
            namespace "$PKG"
            compileSdkVersion 34
            ndkVersion flutter.ndkVersion
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
            defaultConfig {
              applicationId "$PKG"
              minSdkVersion 21
              targetSdkVersion 34
              versionCode 1
              versionName "1.0.0"
            }
            buildTypes {
              release {
                signingConfig signingConfigs.debug
                minifyEnabled false
                shrinkResources false
              }
            }
          }
          flutter { source = '../..' }
          GRADLE

          cat > android/settings.gradle <<'GRADLE'
          pluginManagement {
            def flutterSdkPath = {
              def properties = new Properties()
              file("local.properties").withInputStream { properties.load(it) }
              def flutterSdkPath = properties.getProperty("flutter.sdk")
              assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
              return flutterSdkPath
            }()
            includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          plugins {
            id "dev.flutter.flutter-plugin-loader" version "1.0.0"
            id "com.android.application" version "8.1.0" apply false
            id "org.jetbrains.kotlin.android" version "1.9.0" apply false
          }
          include ":app"
          GRADLE

          # ===== DOWNLOAD ICON =====
          if [ -n "$ICON" ]; then
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-mdpi
            curl -sL "$ICON" -o /tmp/icon.png || true
            if [ -f /tmp/icon.png ]; then
              for size in 192 144 96 72 48; do
                dir="android/app/src/main/res/mipmap-xxxhdpi"
                [ "$size" = "144" ] && dir="android/app/src/main/res/mipmap-xxhdpi"
                [ "$size" = "96" ] && dir="android/app/src/main/res/mipmap-xhdpi"
                [ "$size" = "72" ] && dir="android/app/src/main/res/mipmap-hdpi"
                [ "$size" = "48" ] && dir="android/app/src/main/res/mipmap-mdpi"
                cp /tmp/icon.png "$dir/ic_launcher.png" 2>/dev/null || true
              done
            fi
          fi

          # ===== GENERATE lib/main.dart via PYTHON (clean & complex) =====
          python3 <<'PYEOF'
          import os, base64

          # ── Read env ──
          url   = os.environ['URL']
          app   = os.environ['APP']
          color = os.environ['COLOR']
          fs    = os.environ.get('FS', 'edge_to_edge')
          orient= os.environ.get('ORIENT', 'auto')
          load  = os.environ.get('LOAD', 'premium')
          perm  = os.environ.get('PERM') == 'true'
          local = os.environ.get('LOCAL') == 'true'
          cam   = os.environ.get('CAM') == 'true'
          mic   = os.environ.get('MIC') == 'true'
          loc   = os.environ.get('LOC') == 'true'
          sto   = os.environ.get('STO') == 'true'
          pho   = os.environ.get('PHO') == 'true'
          con   = os.environ.get('CON') == 'true'
          blu   = os.environ.get('BLU') == 'true'

          # ── 1. URL OBFUSCATION (XOR + Base64, reconstructed runtime) ──
          key = "NanoSecureKey2024X7Z9Q2"
          enc = "".join(chr(ord(c) ^ ord(key[i % len(key)])) for i, c in enumerate(url))
          b64 = base64.b64encode(enc.encode()).decode()
          chunks = [b64[i:i+12] for i in range(0, len(b64), 12)]
          chunks_dart = " + ".join(f'"{c}"' for c in chunks)

          # ── 2. Anti-WebView JS Shield ──
          shield = '''
          (function(){
            function S(){
              var m=document.createElement('meta');
              m.name='viewport';
              m.content='width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover';
              var e=document.querySelector('meta[name=viewport]');
              if(e)e.content=m.content;else document.head.appendChild(m);

              var s=document.createElement('style');
              s.textContent='*{-webkit-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important;-webkit-tap-highlight-color:transparent!important;}';
              document.head.appendChild(s);

              document.addEventListener('contextmenu',function(e){e.preventDefault();return false;},true);
              document.addEventListener('selectstart',function(e){e.preventDefault();return false;},true);

              document.addEventListener('click',function(e){
                var el=e.target;
                while(el&&el!==document.body){
                  if(el.tagName==='A'){
                    if(el.href&&el.href.startsWith('http')){
                      e.preventDefault();e.stopPropagation();
                      if(window.LinkBridge)window.LinkBridge.postMessage(el.href);
                      return false;
                    }break;
                  }
                  el=el.parentElement;
                }
              },true);

              var last=0;
              document.addEventListener('touchend',function(e){
                var n=Date.now();
                if(n-last<=300)e.preventDefault();
                last=n;
              },false);

              document.documentElement.style.setProperty('caret-color','transparent');
            }
            if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',S);
            else S();
          })();
          '''

          # ── 3. Imports ──
          imports = [
              "import 'package:flutter/material.dart';",
              "import 'package:flutter/services.dart';",
              "import 'package:webview_flutter/webview_flutter.dart';",
              "import 'package:connectivity_plus/connectivity_plus.dart';",
              "import 'dart:async';",
              "import 'dart:io';",
              "import 'dart:convert';",
          ]
          if perm:   imports.append("import 'package:permission_handler/permission_handler.dart';")
          if local:  imports.append("import 'package:shared_preferences/shared_preferences.dart';")

          # ── 4. Permission lines ──
          plines = []
          if perm:
              if cam: plines.append("await _requestSinglePerm(Permission.camera, 'Camera');")
              if mic: plines.append("await _requestSinglePerm(Permission.microphone, 'Microphone');")
              if loc: plines.append("await _requestSinglePerm(Permission.location, 'Lokasi');")
              if sto: plines.extend(["await _requestSinglePerm(Permission.storage, 'Penyimpanan');","await _requestSinglePerm(Permission.photos, 'Galeri');"])
              if pho: plines.append("await _requestSinglePerm(Permission.phone, 'Telepon');")
              if con: plines.append("await _requestSinglePerm(Permission.contacts, 'Kontak');")
              if blu: plines.append("await _requestSinglePerm(Permission.bluetooth, 'Bluetooth');")

          # ── 5. System UI mode ──
          if fs == 'immersive':   chrome = 'SystemUiMode.immersiveSticky'
          elif fs == 'normal':    chrome = 'SystemUiMode.manual'
          else:                   chrome = 'SystemUiMode.edgeToEdge'

          orient_code = ''
          if orient == 'portrait':
              orient_code = "SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp, DeviceOrientation.portraitDown]);"
          elif orient == 'landscape':
              orient_code = "SystemChrome.setPreferredOrientations([DeviceOrientation.landscapeLeft, DeviceOrientation.landscapeRight]);"

          # ── 6. Build Dart ──
          lines = []
          lines.extend(imports)
          lines.append("")

          # URL decryptor
          lines.append(f"""
          String _getTargetUrl() {{
            const _kKey = '{key}';
            const _kEnc = {chunks_dart};
            final bytes = base64Decode(_kEnc);
            final sb = StringBuffer();
            for (var i = 0; i < bytes.length; i++) {{
              sb.writeCharCode(bytes[i] ^ _kKey.codeUnitAt(i % _kKey.length));
            }}
            return sb.toString();
          }}
          """)

          # Shield
          lines.append(f"""
          const String _kShield = '''
          {shield}
          ''';
          """)

          # Main
          lines.append(f"""
          void main() {{
            WidgetsFlutterBinding.ensureInitialized();
            {orient_code}
            SystemChrome.setEnabledSystemUIMode({chrome});
            SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
              statusBarColor: Colors.transparent,
              systemNavigationBarColor: Colors.transparent,
              statusBarIconBrightness: Brightness.light,
              systemNavigationBarIconBrightness: Brightness.light,
            ));
            runApp(const MyApp());
          }}

          class MyApp extends StatelessWidget {{
            const MyApp({{super.key}});
            @override
            Widget build(BuildContext context) {{
              return MaterialApp(
                title: '{app}',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  useMaterial3: true,
                  colorScheme: ColorScheme.fromSeed(
                    seedColor: Color({color}),
                    brightness: Brightness.dark,
                  ),
                ),
                home: const WebViewScreen(),
              );
            }}
          }}

          class WebViewScreen extends StatefulWidget {{
            const WebViewScreen({{super.key}});
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }}

          class _WebViewScreenState extends State<WebViewScreen> with TickerProviderStateMixin {{
            late final WebViewController _controller;
            late final String _targetUrl;
            bool _isLoading = true;
            String _errorMessage = '';
            bool _hasInternet = true;
            double _progress = 0;
            int _retryCount = 0;
            static const int _maxRetries = 3;
            late AnimationController _pulse;
            late AnimationController _shimmer;

            @override
            void initState() {{
              super.initState();
              _targetUrl = _getTargetUrl();
              _pulse = AnimationController(vsync: this, duration: const Duration(milliseconds: 1500))..repeat(reverse: true);
              _shimmer = AnimationController(vsync: this, duration: const Duration(milliseconds: 2000))..repeat();
              _checkNet();
              _initWebView();
            }}

            Future<void> _checkNet() async {{
              final r = await Connectivity().checkConnectivity();
              setState(() => _hasInternet = r != ConnectivityResult.none);
              Connectivity().onConnectivityChanged.listen((r) {{
                setState(() => _hasInternet = r != ConnectivityResult.none);
                if (_hasInternet && _errorMessage.isNotEmpty) {{
                  _retryCount = 0;
                  _controller.reload();
                }}
              }});
            }}

            Future<void> _reqPerm() async {{
              {'\n              '.join(plines) if plines else '// Permissions disabled'}
            }}

            Future<void> _requestSinglePerm(Permission perm, String name) async {{
              final status = await perm.status;
              if (status.isDenied || status.isRestricted) {{
                final result = await perm.request();
                debugPrint('$name: ${{result.toString()}}');
              }}
            }}

            void _initWebView() {{
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..addJavaScriptChannel('LinkBridge', onMessageReceived: (message) {{
                  final href = message.message;
                  final targetHost = Uri.parse(_targetUrl).host;
                  final reqHost = Uri.tryParse(href)?.host ?? '';
                  if (reqHost == targetHost || reqHost.endsWith('.' + targetHost)) {{
                    _controller.loadRequest(Uri.parse(href));
                  }}
                }})
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onNavigationRequest: (request) {{
                      final reqHost = Uri.parse(request.url).host;
                      final targetHost = Uri.parse(_targetUrl).host;
                      if (reqHost != targetHost && !request.url.startsWith('data:') && !request.url.startsWith('about:blank')) {{
                        return NavigationDecision.prevent;
                      }}
                      return NavigationDecision.navigate;
                    }},
                    onProgress: (p) => setState(() => _progress = p / 100),
                    onPageStarted: (String url) {{
                      setState(() {{
                        _isLoading = true;
                        _errorMessage = '';
                        _progress = 0;
                      }});
                    }},
                    onPageFinished: (String url) {{
                      setState(() {{
                        _isLoading = false;
                        _retryCount = 0;
                      }});
                      _controller.runJavaScript(_kShield);
                    }},
                    onWebResourceError: (WebResourceError error) {{
                      if (_retryCount < _maxRetries && _hasInternet) {{
                        _retryCount++;
                        final delay = Duration(seconds: _retryCount * 2);
                        Future.delayed(delay, () {{
                          if (mounted) _controller.reload();
                        }});
                        setState(() {{
                          _errorMessage = 'Mencoba ulang ($_retryCount/$_maxRetries)...';
                        }});
                        return;
                      }}
                      String m = 'Error memuat halaman';
                      switch (error.errorCode) {{
                        case -2: m = 'Tidak ada koneksi internet'; break;
                        case -6: m = 'Server menolak koneksi'; break;
                        case -8: m = 'Server tidak merespon'; break;
                        case -15: m = 'Sertifikat SSL tidak valid'; break;
                        case -11: m = 'Timeout koneksi'; break;
                        case -1: m = 'Request dibatalkan'; break;
                      }}
                      setState(() {{
                        _isLoading = false;
                        _errorMessage = m;
                      }});
                    }},
                    onHttpError: (HttpResponseError error) {{
                      if (_retryCount < _maxRetries) {{
                        _retryCount++;
                        Future.delayed(Duration(seconds: _retryCount * 2), () {{
                          if (mounted) _controller.reload();
                        }});
                        setState(() => _errorMessage = 'HTTP Error - Mencoba ulang ($_retryCount/$_maxRetries)...');
                        return;
                      }}
                      setState(() {{
                        _isLoading = false;
                        _errorMessage = 'HTTP Error: Gagal memuat konten';
                      }});
                    }},
                  ),
                )
                ..loadRequest(Uri.parse(_targetUrl));
              _reqPerm();
            }}

            Future<void> _refresh() async {{
              _retryCount = 0;
              await _controller.reload();
              await Future.delayed(const Duration(milliseconds: 800));
            }}

            @override
            void dispose() {{
              _pulse.dispose();
              _shimmer.dispose();
              super.dispose();
            }}

            @override
            Widget build(BuildContext context) {{
              return Scaffold(
                backgroundColor: Colors.black,
                body: Stack(
                  children: [
                    SafeArea(
                      top: false,
                      bottom: false,
                      maintainBottomViewPadding: true,
                      child: WebViewWidget(controller: _controller),
                    ),
                    if (_isLoading) _buildLoad(),
                    if (_errorMessage.isNotEmpty) _buildErr(),
                  ],
                ),
              );
            }}
          """)

          # ── 7. Loading style ──
          if load == 'premium':
              lines.append("""
            Widget _buildLoad() {
              return Container(
                color: const Color(0xFF0f0c29),
                child: Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      AnimatedBuilder(
                        animation: _pulse,
                        builder: (_, __) => Container(
                          width: 80 + (_pulse.value * 20),
                          height: 80 + (_pulse.value * 20),
                          decoration: BoxDecoration(
                            shape: BoxShape.circle,
                            gradient: const SweepGradient(colors: [Color(0xFF667eea), Color(0xFF764ba2), Color(0xFF667eea)]),
                            boxShadow: [
                              BoxShadow(
                                color: const Color(0xFF667eea).withOpacity(0.5 + _pulse.value * 0.3),
                                blurRadius: 30 + _pulse.value * 20,
                                spreadRadius: 2,
                              ),
                            ],
                          ),
                          child: const Center(
                            child: Icon(Icons.touch_app, color: Colors.white, size: 32),
                          ),
                        ),
                      ),
                      const SizedBox(height: 40),
                      SizedBox(
                        width: 200,
                        height: 4,
                        child: ClipRRect(
                          borderRadius: BorderRadius.circular(8),
                          child: LinearProgressIndicator(
                            value: _progress,
                            backgroundColor: Colors.white10,
                            valueColor: const AlwaysStoppedAnimation<Color>(Color(0xFF667eea)),
                          ),
                        ),
                      ),
                      const SizedBox(height: 24),
                      AnimatedBuilder(
                        animation: _shimmer,
                        builder: (_, __) => ShaderMask(
                          shaderCallback: (b) => LinearGradient(
                            colors: const [Colors.white70, Colors.white, Colors.white70],
                            stops: const [0.0, 0.5, 1.0],
                            begin: Alignment(-1.0 + _shimmer.value * 2.0, 0),
                            end: Alignment(_shimmer.value * 2.0, 0),
                          ).createShader(b),
                          child: const Text(
                            'MEMUAT KONTEN...',
                            style: TextStyle(
                              fontSize: 14,
                              fontWeight: FontWeight.w700,
                              letterSpacing: 3,
                              color: Colors.white,
                            ),
                          ),
                        ),
                      ),
                      const SizedBox(height: 8),
                      Text(
                        'APPNAME',
                        style: TextStyle(
                          fontSize: 12,
                          color: Colors.white.withOpacity(0.4),
                          letterSpacing: 1,
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
              """)
          else:
              lines.append("""
            Widget _buildLoad() {
              return Container(
                color: const Color(0xFF0f0c29),
                child: const Center(
                  child: CircularProgressIndicator(
                    valueColor: AlwaysStoppedAnimation<Color>(Color(0xFF667eea)),
                  ),
                ),
              );
            }
              """)

          # ── 8. Error & Button widgets ──
          lines.append("""
            Widget _buildErr() {
              return Container(
                color: const Color(0xFF0f0c29),
                child: Center(
                  child: Padding(
                    padding: const EdgeInsets.all(32),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        Icon(
                          !_hasInternet ? Icons.wifi_off_rounded : Icons.error_outline_rounded,
                          size: 72,
                          color: !_hasInternet ? Colors.orangeAccent : Colors.redAccent,
                        ),
                        const SizedBox(height: 20),
                        Text(
                          !_hasInternet ? 'KONEKSI TERPUTUS' : 'TERJADI KESALAHAN',
                          style: const TextStyle(
                            fontSize: 18,
                            fontWeight: FontWeight.bold,
                            color: Colors.white,
                            letterSpacing: 1,
                          ),
                        ),
                        const SizedBox(height: 12),
                        Text(
                          _errorMessage,
                          textAlign: TextAlign.center,
                          style: TextStyle(
                            fontSize: 14,
                            color: Colors.white.withOpacity(0.6),
                            height: 1.5,
                          ),
                        ),
                        const SizedBox(height: 32),
                        Row(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: [
                            _btn(
                              Icons.refresh_rounded,
                              'COBA LAGI',
                              () {
                                setState(() {
                                  _errorMessage = '';
                                  _isLoading = true;
                                  _retryCount = 0;
                                });
                                _controller.reload();
                              },
                            ),
                            if (!_hasInternet) const SizedBox(width: 16),
                            if (!_hasInternet)
                              _btn(
                                Icons.wifi,
                                'CEK KONEKSI',
                                _checkNet,
                                color: Colors.orangeAccent,
                              ),
                          ],
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }

            Widget _btn(IconData i, String l, VoidCallback t, {Color color = const Color(0xFF667eea)}) {
              return Material(
                color: Colors.transparent,
                child: InkWell(
                  onTap: t,
                  borderRadius: BorderRadius.circular(16),
                  child: Container(
                    padding: const EdgeInsets.symmetric(horizontal: 20, vertical: 14),
                    decoration: BoxDecoration(
                      gradient: LinearGradient(
                        colors: [color, color.withOpacity(0.7)],
                      ),
                      borderRadius: BorderRadius.circular(16),
                      boxShadow: [
                        BoxShadow(
                          color: color.withOpacity(0.3),
                          blurRadius: 12,
                          offset: const Offset(0, 4),
                        ),
                      ],
                    ),
                    child: Row(
                      mainAxisSize: MainAxisSize.min,
                      children: [
                        Icon(i, color: Colors.white, size: 18),
                        const SizedBox(width: 8),
                        Text(
                          l,
                          style: const TextStyle(
                            color: Colors.white,
                            fontWeight: FontWeight.w600,
                            fontSize: 13,
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          """)

          dart_code = '\n'.join(lines)
          dart_code = dart_code.replace('APPNAME', app)

          with open('lib/main.dart', 'w') as f:
              f.write(dart_code)
          PYEOF

          # ===== ANDROID CONFIG =====
          mkdir -p android/app/src/main/res/values android/app/src/main/res/drawable

          cat > android/app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="LaunchTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowBackground">@drawable/launch_background</item>
              <item name="android:windowFullscreen">false</item>
              <item name="android:windowDrawsSystemBarBackgrounds">true</item>
              <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
              <item name="android:windowTranslucentStatus">true</item>
              <item name="android:windowTranslucentNavigation">true</item>
            </style>
            <style name="NormalTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowBackground">?android:colorBackground</item>
              <item name="android:windowFullscreen">false</item>
              <item name="android:windowDrawsSystemBarBackgrounds">true</item>
              <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
              <item name="android:windowTranslucentStatus">true</item>
              <item name="android:windowTranslucentNavigation">true</item>
            </style>
          </resources>
          EOF

          cat > android/app/src/main/res/drawable/launch_background.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
            <item android:drawable="@android:color/black" />
          </layer-list>
          EOF

          PKG_PATH=$(echo "$PKG" | tr '.' '/')
          mkdir -p "android/app/src/main/kotlin/$PKG_PATH"
          cat > "android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt" <<EOF
          package $PKG
          import android.os.Bundle
          import android.view.WindowManager
          import io.flutter.embedding.android.FlutterActivity
          import androidx.core.view.WindowCompat
          class MainActivity: FlutterActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
              super.onCreate(savedInstanceState)
              WindowCompat.setDecorFitsSystemWindows(window, false)
              window.attributes.layoutInDisplayCutoutMode = WindowManager.LayoutParams.LAYOUT_IN_DISPLAY_CUTOUT_MODE_SHORT_EDGES
            }
          }
          EOF

          SCREEN=""
          [ "$ORIENT" = "portrait" ] && SCREEN='android:screenOrientation="portrait"'
          [ "$ORIENT" = "landscape" ] && SCREEN='android:screenOrientation="landscape"'

          cat > android/app/src/main/AndroidManifest.xml <<EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
          EOF
          [ "$CAM" = "true" ] && echo '    <uses-permission android:name="android.permission.CAMERA"/>' >> android/app/src/main/AndroidManifest.xml
          [ "$MIC" = "true" ] && echo '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' >> android/app/src/main/AndroidManifest.xml
          [ "$LOC" = "true" ] && { echo '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>'; echo '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>'; } >> android/app/src/main/AndroidManifest.xml
          [ "$STO" = "true" ] && { echo '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>'; echo '    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>'; echo '    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>'; } >> android/app/src/main/AndroidManifest.xml
          [ "$PHO" = "true" ] && echo '    <uses-permission android:name="android.permission.READ_PHONE_STATE"/>' >> android/app/src/main/AndroidManifest.xml
          [ "$CON" = "true" ] && echo '    <uses-permission android:name="android.permission.READ_CONTACTS"/>' >> android/app/src/main/AndroidManifest.xml
          [ "$BLU" = "true" ] && { echo '    <uses-permission android:name="android.permission.BLUETOOTH"/>'; echo '    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>'; } >> android/app/src/main/AndroidManifest.xml

          cat >> android/app/src/main/AndroidManifest.xml <<EOF
            <application
              android:label="$APP"
              android:name="\${applicationName}"
              android:icon="@mipmap/ic_launcher"
              android:usesCleartextTraffic="true">
              <activity
                android:name=".MainActivity"
                android:exported="true"
                android:launchMode="singleTop"
                android:theme="@style/LaunchTheme"
                android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                android:hardwareAccelerated="true"
                android:windowSoftInputMode="adjustResize"
                $SCREEN>
                <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <meta-data android:name="flutterEmbedding" android:value="2"/>
            </application>
          </manifest>
          EOF

          flutter pub get

      - name: 🔨 Build APK
        run: |
          cd web2app_temp
          flutter build apk --release

      - name: 🚀 Release APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }} v${{ github.run_number }}"
          files: web2app_temp/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
